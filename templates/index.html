<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body">

            <h1 class="mb-3">Employee Management Dashboard</h1>

            <p class="text-muted">
                AWS ECS + ECR + GitHub Actions CI/CD + PostgreSQL
            </p>

            <h2 class="mb-4">
                Total Employees:
                <span class="badge bg-primary">{{ count }}</span>
            </h2>

            <form method="POST" action="/add" class="row g-2 mb-4">

                <div class="col-md-5">
                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        placeholder="Employee Name"
                        required>
                </div>

                <div class="col-md-5">
                    <input
                        type="text"
                        name="position"
                        class="form-control"
                        placeholder="Position"
                        required>
                </div>

                <div class="col-md-2">
                    <button
                        type="submit"
                        class="btn btn-primary w-100">
                        Add Employee
                    </button>
                </div>

            </form>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Position</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                {% for employee in employees %}
                <tr>

                    <td>{{ employee[0] }}</td>
                    <td>{{ employee[1] }}</td>
                    <td>{{ employee[2] }}</td>

                    <td>

                        <a
                            href="/edit/{{ employee[0] }}"
                            class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <form
                            method="POST"
                            action="/delete/{{ employee[0] }}"
                            style="display:inline;">

                            <button
                                type="submit"
                                class="btn btn-danger btn-sm">
                                Delete
                            </button>

                        </form>

                    </td>

                </tr>
                {% endfor %}

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
